<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Tra Độ Thẳng</title>
    <!-- Tailwind CSS để dựng layout nhanh & responsive -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font sang xịn mịn -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
</head>
<body class="bg-pattern flex flex-col items-center justify-start min-h-screen p-4 sm:p-6 md:p-8">

    <!-- Container chính -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden mt-6 mb-8 transition-all duration-300 hover:shadow-purple-100">
        
        <!-- Header & Avatar Area -->
        <div class="bg-slate-50 border-b border-slate-100 p-6 flex flex-col items-center space-y-4">
            <!-- Avatar mèo có fallback khi lỗi link ảnh hoặc chưa có file cục bộ -->
            <img src="avatar_meo.jpg" alt="Avatar" class="avatar" 
                 onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=200&auto=format&fit=crop';">
            
            <div id="header" class="w-full">Kiểm Tra xem bạn có gay không</div>
            
            <h2 id="form-title">
                <span>N</span><span>h</span><span>ậ</span><span>p</span>
                <span>t</span><span>h</span><span>ô</span><span>n</span><span>g</span>
                <span>t</span><span>i</span><span>n</span>
                <span>c</span><span>ủ</span><span>a</span>
                <span>b</span><span>ạ</span><span>n</span>
            </h2>
        </div>

        <!-- Form nhập liệu -->
        <div class="p-6 space-y-5">
            <form id="info-form" class="space-y-4">
                <!-- Họ tên -->
                <div class="flex flex-col gap-1.5">
                    <label for="fullname" class="text-sm font-bold text-slate-700">Họ tên:</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập đầy đủ họ tên..." 
                           class="w-full px-4 py-3 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:bg-white text-slate-800 placeholder-slate-400 font-medium">
                </div>

                <!-- Năm sinh -->
                <div class="flex flex-col gap-1.5">
                    <label for="birthyear" class="text-sm font-bold text-slate-700">Năm sinh:</label>
                    <input type="number" id="birthyear" name="birthyear" min="-999999999999" max="999999999999" placeholder="Ví dụ: 2000"
                           class="w-full px-4 py-3 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:outline-none focus:bg-white text-slate-800 placeholder-slate-400 font-medium">
                </div>

                <!-- Giới tính sinh học -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-bold text-slate-700">Giới tính:</label>
                    <div class="grid grid-cols-3 gap-3">
                        <label class="relative flex items-center justify-center p-3 border-2 border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                            <input type="radio" name="gender" value="Nam" class="sr-only peer">
                            <div class="peer-checked:border-blue-500 peer-checked:bg-blue-50 absolute inset-0 rounded-2xl border-2 border-transparent transition-all pointer-events-none"></div>
                            <span class="relative z-10 text-sm font-bold text-slate-600 peer-checked:text-blue-600">🙋‍♂️ Nam</span>
                        </label>

                        <label class="relative flex items-center justify-center p-3 border-2 border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                            <input type="radio" name="gender" value="Nữ" class="sr-only peer">
                            <div class="peer-checked:border-pink-500 peer-checked:bg-pink-50 absolute inset-0 rounded-2xl border-2 border-transparent transition-all pointer-events-none"></div>
                            <span class="relative z-10 text-sm font-bold text-slate-600 peer-checked:text-pink-600">🙋‍♀️ Nữ</span>
                        </label>

                        <label class="relative flex items-center justify-center p-3 border-2 border-slate-200 rounded-2xl cursor-pointer hover:bg-slate-50 transition-all">
                            <input type="radio" name="gender" value="Khác" class="sr-only peer">
                            <div class="peer-checked:border-purple-500 peer-checked:bg-purple-50 absolute inset-0 rounded-2xl border-2 border-transparent transition-all pointer-events-none"></div>
                            <span class="relative z-10 text-sm font-bold text-slate-600 peer-checked:text-purple-600">🌈 Khác</span>
                        </label>
                    </div>
                </div>
            </form>
            
            <!-- Nút kiểm tra -->
            <div class="pt-2">
                <button id="check-btn" type="button" 
                        class="w-full py-4 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:from-indigo-600 hover:to-pink-600 text-white font-extrabold rounded-2xl shadow-lg shadow-purple-200 hover:shadow-purple-300 active:scale-[0.98] transition-all duration-150 flex items-center justify-center gap-2">
                    <span>🚀</span> KIỂM TRA
                </button>
            </div>

            <!-- Hiệu ứng quét tâm linh ảo diệu -->
            <div id="scanning-status" class="hidden flex-col items-center justify-center py-4 space-y-2">
                <div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs font-bold text-purple-500 animate-pulse">Đang quét cơ sở dữ liệu tâm linh...</p>
            </div>

            <!-- Khung hiển thị kết quả -->
            <div id="result" class="p-4 border-2 border-dashed border-slate-200 bg-slate-50/50 rounded-2xl transition-all duration-300 text-sm text-slate-600">
                <span style="color: #94a3b8; font-style: italic;" class="block text-center py-2">Kết quả phân tích sẽ hiển thị tại đây...</span>
            </div>
        </div>

        <!-- Footer tích hợp vào đáy Card cực kỳ tinh tế và gọn gàng -->
        <div id="footer" class="bg-slate-50 px-6 py-5 border-t border-slate-100 space-y-2">
            <p class="text-center text-slate-400 text-xs font-semibold m-0">
                &copy; 2026 Bản quyền thuộc về 
                <a id="link-facebook" href="https://www.facebook.com/nguyen.thanh.trung.227419?locale=vi_VN" target="_blank" class="text-indigo-500 hover:underline">Nguyễn Thành Trung</a>
            </p>
            <p class="text-center text-slate-400 text-xs font-semibold m-0 flex items-center justify-center gap-1">
                <span>ⓕ</span> facebook: 
                <a href="https://www.facebook.com/nguyen.thanh.trung.227419?locale=vi_VN" target="_blank" class="text-indigo-500 hover:underline">Nguyễn Thành Trung</a>
            </p>
            <p class="text-center text-slate-400 text-xs font-semibold m-0 flex items-center justify-center gap-1">
                <span>ⓣ</span> tiktok: 
                <a href="https://vt.tiktok.com/ZSCkkFcHU/" target="_blank" class="text-pink-500 hover:underline">Nguyễn Thành Trung</a>
            </p>
        </div>
    </div>

    <!-- Script xử lý Logic cốt lõi -->
    <script src="main.js"></script>
</body>
</html>
